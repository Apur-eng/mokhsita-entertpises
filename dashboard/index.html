<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Order Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Base resets for standalone dashboard */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f7f4ef; }
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 72px;
            background: rgba(247,244,239,0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(194,106,61,0.15);
        }
        .nav-logo { text-decoration: none; }
        .nav-logo-title { display: block; font-family: 'Lora', serif; font-size: 1.1rem; color: #2b332f; font-weight: 600; }
        .nav-logo-sub { display: block; font-size: 0.75rem; color: #6a7d75; letter-spacing: 0.5px; }
        .nav-cta {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 22px; border-radius: 50px;
            background: #c26a3d; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
            text-decoration: none; transition: background 0.2s;
        }
        .nav-cta:hover { background: #a85530; }
        .checkout-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 50px; border: none; cursor: pointer;
            background: #c26a3d; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500;
            transition: background 0.2s;
        }
        .checkout-btn:hover { background: #a85530; }
    </style>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 120px auto 80px;
            padding: 0 40px;
            font-family: 'Inter', sans-serif;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .admin-title {
            font-family: 'Lora', serif;
            font-size: 2.5rem;
            color: #2b332f;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(194, 106, 61, 0.2);
            box-shadow: 0 4px 12px rgba(43, 51, 47, 0.05);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: #c26a3d;
            margin-bottom: 8px;
        }
        .stat-label {
            color: #6a7d75;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .orders-table-wrapper {
            background: #fff;
            border-radius: 12px;
            border: 1px solid rgba(194, 106, 61, 0.2);
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(43, 51, 47, 0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(194, 106, 61, 0.1);
        }
        th {
            background: #faf9f6;
            color: #2b332f;
            font-weight: 500;
            font-size: 0.95rem;
        }
        td {
            color: #3a4a42;
            font-size: 0.95rem;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: capitalize;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d1ecf1; color: #0c5460; }
        .status-shipped { background: #cce5ff; color: #004085; }
        .status-delivered { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        select.status-dropdown {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }
        .action-btn {
            background: none;
            border: none;
            color: #c26a3d;
            cursor: pointer;
            text-decoration: underline;
            font-family: 'Inter', sans-serif;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: #fff; width: 90%; max-width: 600px;
            border-radius: 12px; padding: 30px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-title { font-family: 'Lora', serif; font-size: 1.5rem; color: #2b332f; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666; }
    </style>
</head>
<body class="page-bg-wrapper">

<nav class="nav" id="main-nav" aria-label="Main navigation">
  <a href="../index.html" class="nav-logo">
    <span class="nav-logo-title">Mokshita Enterprises</span>
    <span class="nav-logo-sub">Admin Panel</span>
  </a>
  <a href="../index.html" class="nav-cta" style="margin-left:auto;">← Back to Site</a>
  <button id="admin-logout-btn" class="nav-cta" style="margin-left:15px; background: #ab4a3b; border: none; cursor: pointer;">Log Out</button>
</nav>

<main class="admin-container">
    <div class="admin-header">
        <h1 class="admin-title">Order Management</h1>
        <button class="checkout-btn" style="width:auto; padding: 10px 24px; margin:0;" onclick="loadOrders()">Refresh Orders</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-new">0</div>
            <div class="stat-label">New / Pending</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-shipped">0</div>
            <div class="stat-label">Shipped</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-revenue">₹0</div>
            <div class="stat-label">Total Revenue</div>
        </div>
    </div>

    <h2 style="margin-bottom:15px; font-family:'Lora', serif; color:#2b332f;">Pending Orders</h2>
    <div class="orders-table-wrapper" style="margin-bottom: 40px;">
        <table>
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="pending-orders-tbody">
                <tr><td colspan="6" style="text-align:center;">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>

    <h2 style="margin-bottom:15px; font-family:'Lora', serif; color:#2b332f;">Order History</h2>
    <div class="orders-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="history-orders-tbody">
                <tr><td colspan="6" style="text-align:center;">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<div class="modal-overlay" id="order-modal">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title" id="modal-order-id">Order Details</h2>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div id="modal-content"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    if (!window.supabaseClient && window.supabase && window.supabase.createClient) {
      window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- Route Protection ---
    window.addEventListener('DOMContentLoaded', async () => {
      const { data: { session }, error } = await window.supabaseClient.auth.getSession();
      if (error || !session) {
        // No valid session, redirect to login page
        window.location.replace('login.html');
      } else {
        // We have a session, allow access
        console.log('[Supabase] Admin authenticated as:', session.user.email);
      }
    });

    // --- Logout Logic ---
    document.getElementById('admin-logout-btn').addEventListener('click', async () => {
      const btn = document.getElementById('admin-logout-btn');
      btn.textContent = 'Logging out...';
      btn.disabled = true;
      await window.supabaseClient.auth.signOut();
      window.location.replace('login.html');
    });
  })();
</script>
<script src="admin_orders.js"></script>

</body>
</html>
