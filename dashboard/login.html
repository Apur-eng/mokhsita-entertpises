<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Mokshita Enterprises</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Login specific overrides */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: var(--surface);
            padding: 48px 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border-warm);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--terra));
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--terra), var(--gold));
            border-radius: 12px;
            display: inline-flex; align-items: center; justify-content: center;
            font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 600;
            color: #fff;
            margin-bottom: 16px;
        }
        .login-title { 
            font-family: 'Lora', serif; font-size: 1.75rem; 
            color: var(--text-1); margin-bottom: 8px; font-weight: 600;
        }
        .login-sub { font-size: 0.9rem; color: var(--text-3); }

        .form-group { margin-bottom: 24px; }
        .form-group label { 
            display: block; margin-bottom: 8px; font-weight: 500; 
            color: var(--text-2); font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border); 
            border-radius: var(--radius-sm);
            color: var(--text-1);
            font-family: 'Inter', sans-serif; font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus { 
            outline: none; 
            border-color: var(--terra); 
            box-shadow: 0 0 0 2px rgba(194,106,61,0.2); 
        }

        .btn-submit {
            width: 100%; padding: 14px;
            background: var(--terra); color: #fff;
            border: none; border-radius: 50px;
            font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 500;
            cursor: pointer; transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-submit:hover { background: var(--terra-dim); }
        .btn-submit:disabled { background: var(--surface-3); color: var(--text-3); cursor: not-allowed; }

        .error-msg {
            background: rgba(171,74,59,0.1);
            border: 1px solid rgba(171,74,59,0.2);
            color: #f08080; 
            font-size: 0.85rem; 
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-top: 20px; 
            text-align: center; 
            display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-logo">
        <div class="login-logo-icon">M</div>
        <h1 class="login-title">Admin Login</h1>
        <p class="login-sub">Mokshita Enterprises Dashboard</p>
    </div>

    <form id="admin-login-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
        <div class="error-msg" id="error-msg"></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabaseClient.js"></script>
<script src="../modules/ui.js"></script>
<script src="../modules/auth.js"></script>
<script>
    // Redirect if already logged in
    window.addEventListener('DOMContentLoaded', async () => {
        await window.App.Auth.requireGuest('index.html');
    });

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        btn.textContent = 'Signing in...';
        btn.disabled = true;
        errorMsg.style.display = 'none';

        const { data, error } = await window.supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            window.App.UI.showError(error.message);
            errorMsg.textContent = error.message;
            errorMsg.style.display = 'block';
            btn.textContent = 'Sign In';
            btn.disabled = false;
        } else {
            window.App.UI.showSuccess("Welcome!");
            // Success! Redirect to the dashboard
            window.location.href = 'index.html';
        }
    });
</script>

</body>
</html>
