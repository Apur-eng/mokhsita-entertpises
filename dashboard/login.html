<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mokshita Enterprises</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Base resets for standalone dashboard */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f7f4ef; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(194, 106, 61, 0.2);
            box-shadow: 0 8px 24px rgba(43, 51, 47, 0.08);
            width: 100%;
            max-width: 400px;
        }

        .login-header { text-align: center; margin-bottom: 30px; }
        .login-title { font-family: 'Lora', serif; font-size: 2rem; color: #2b332f; margin-bottom: 8px; }
        .login-sub { font-size: 0.9rem; color: #6a7d75; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #2b332f; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 1px solid #ddd; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #c26a3d; }

        .btn-submit {
            width: 100%; padding: 14px;
            background: #c26a3d; color: #fff;
            border: none; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 500;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-submit:hover { background: #a85530; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

        .error-msg {
            color: #d32f2f; font-size: 0.85rem; margin-top: 15px; text-align: center; display: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1 class="login-title">Admin Login</h1>
        <p class="login-sub">Mokshita Enterprises Dashboard</p>
    </div>

    <form id="admin-login-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
        <div class="error-msg" id="error-msg"></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Initialize Supabase Client
    const SUPABASE_URL = 'https://txnckfkaecrqwooiobhs.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4bmNrZmthZWNycXdvb2lvYmhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjAyOTQsImV4cCI6MjA5MjY5NjI5NH0.CcD0x_MXDhsW3kFahF7l3C10MejS8YAffaPgBFtLXZ4';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');

        btn.textContent = 'Signing in...';
        btn.disabled = true;
        errorMsg.style.display = 'none';

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            errorMsg.textContent = error.message;
            errorMsg.style.display = 'block';
            btn.textContent = 'Sign In';
            btn.disabled = false;
        } else {
            // Success! Redirect to the dashboard
            window.location.href = 'index.html';
        }
    });
</script>

</body>
</html>
